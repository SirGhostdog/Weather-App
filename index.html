<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Weather App</title>
</head>
<body>
    <h1>Weather App</h1>
    <div id="centerparent"> 
        <div id="centerblock">
            <form id="addressform">
                <label for="address">Location:</label>
                <input type="text" name="addinput" id="address" placeholder="Address/Zipcode/City...">
                <button type="submit">Search</button>
            </form>
            <div id="weathercard">
                <div id="weathertitle">
                    <div class="title">Temperature</div>
                    <div class="title">Feels Like</div>
                    <div class="title">Precipitation</div>
                    <div class="title">Humidity</div>
                    <div class="title">Condition</div>
                </div>
                <div id="weatherdata">
                    <div class="data" id="temperature"></div>
                    <div class="data" id="maximum"></div>
                    <div class="data" id="minimum"></div>
                    <div class="data" id="humid"></div>
                    <div class="data" id="cond"></div>
                </div>
            </div>
        </div>
    </div>
   
    
</body>
</html>
